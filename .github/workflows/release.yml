name: Windows Build with MSYS2 (Cgo)

# 触发条件：推送以 v 开头的 Tag 时触发（如 v1.0.0）
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (amd64) with MSYS2
    runs-on: windows-latest  # 使用 Windows 环境

    steps:
      # 步骤 1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 1.5：设置 Go 环境
      # ⚠️ 必须在 MSYS2 设置之前或之后，但要确保 Go PATH 被设置。
      # 建议放在 MSYS2 之前，以便 MSYS2 知道 Go 的路径。
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' # 替换为你需要的 Go 版本

      # 步骤 2：安装 MSYS2 环境和依赖
      - name: Set up MSYS2 and Dependencies
        uses: msys2/setup-msys2@v2
        with:
          update: true
          # 核心修复: 强制 MSYS2 继承 Windows 的完整 PATH 
          # 这确保了 Go (由 setup-go@v5 设置) 在 msys2 shell 中可以被找到。
          path-type: inherit 
          pacman: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-libaom
            mingw-w64-x86_64-zip
          shell: msys2 {0}

      # 步骤 3：下载 Go 依赖（现在 go 命令应该能找到了）
      - name: Download Go dependencies
        run: go mod download
        shell: msys2 {0} 

      # 步骤 4：编译 Go 程序（启用 Cgo，使用 MSYS2 的依赖）
      - name: Build with Cgo (MSYS2)
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: |
          # 统一输出文件名
          outputName="image2avif-${{ github.ref_name }}-windows-amd64.exe"
          
          # 编译
          go build -o $outputName ./main.go
          
          # 验证
          if [ -f "$outputName" ]; then
            echo "编译成功：$outputName"
          else
            echo "编译失败：未生成可执行文件"
            exit 1
          fi
        shell: msys2 {0} 

      # 步骤 5：将编译产物打包为 zip
      - name: Package as zip
        id: package # 用于传递文件名到下一步
        run: |
          exeName="image2avif-${{ github.ref_name }}-windows-amd64.exe"
          zipName="image2avif-${{ github.ref_name }}-windows-amd64.zip"
          
          # 使用 MSYS2 的 zip 命令打包
          zip $zipName $exeName
          
          # 将 zipName 设置为 output，方便后续步骤使用
          echo "zip_name=$zipName" >> $GITHUB_OUTPUT
        shell: msys2 {0}

      # 步骤 6：上传到 GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}