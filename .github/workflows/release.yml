name: Windows Build with MSYS2 (Cgo)

# 触发条件：推送以 v 开头的 Tag 时触发（如 v1.0.0）
on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows (amd64) with MSYS2
    runs-on: windows-latest  # 使用 Windows 环境

    # 授予创建和上传 Release 所需的权限
    permissions:
      contents: write 

    steps:
      # 步骤 1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 1.5：设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' 

      # 步骤 2：安装 MSYS2 环境和依赖 (修复包名)
      - name: Set up MSYS2 and Dependencies (Fixing Package Names)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          # 确保 MSYS2 继承 Windows 的完整 PATH
          path-type: inherit 
          # 🚀 核心修复：更新包名以匹配 MinGW 仓库
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libavif
            mingw-w64-x86_64-aom
            zip
            mingw-w64-x86_64-pkg-config
          msystem: MINGW64

      # 步骤 3：下载 Go 依赖
      - name: Download Go dependencies
        run: go mod download
        shell: msys2 {0} 

      # 步骤 4：编译 Go 程序（启用 Cgo，依赖 PKG_CONFIG）
      - name: Build with Cgo (MSYS2)
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          
        run: |
          # 统一输出文件名
          outputName="image2avif-${{ github.ref_name }}-windows-amd64.exe"
          
          # 编译
          go build -o $outputName ./main.go
          
          # 验证
          if [ -f "$outputName" ]; then
            echo "编译成功：$outputName"
          else
            echo "编译失败：未生成可执行文件"
            exit 1
          fi
        shell: msys2 {0} 

      # 步骤 5：将编译产物打包为 zip
      - name: Package as zip
        id: package
        run: |
          exeName="image2avif-${{ github.ref_name }}-windows-amd64.exe"
          zipName="image2avif-${{ github.ref_name }}-windows-amd64.zip"
          
          # 使用 MSYS2 的 zip 命令打包
          zip $zipName $exeName
          
          echo "zip_name=$zipName" >> $GITHUB_OUTPUT
        shell: msys2 {0}

      # 步骤 6：上传到 GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}