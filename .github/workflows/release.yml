name: Cross-Platform Build with Cgo (Windows, Linux, macOS)

# 触发条件：推送以 v 开头的 Tag 时触发（如 v1.0.0）
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # 使用矩阵策略定义需要构建的平台
    strategy:
      matrix:
        # 定义操作系统、GoOS、GoARCH、文件后缀和打包工具
        include:
          # Windows (amd64) - 需要 MSYS2/MinGW 和 .exe 后缀
          - os: windows-latest
            goos: windows
            goarch: amd64
            tool: msys2
            dependencies: mingw-w64-x86_64-gcc mingw-w64-x86_64-libwebp mingw-w64-x86_64-libavif mingw-w64-x86_64-aom zip mingw-w64-x86_64-pkg-config
            filename_ext: .exe
            archive_ext: .zip
          
          # Linux (amd64) - 使用标准的 apt 包管理器
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            tool: apt
            dependencies: build-essential libavif-dev libaom-dev libwebp-dev tar zip pkg-config # 确保 tar 也安装
            filename_ext: "" 
            archive_ext: .tar.gz
            
          # macOS (amd64) - 使用 Homebrew
          - os: macos-latest
            goos: darwin
            goarch: amd64
            tool: brew
            dependencies: libavif aom webp pkg-config
            filename_ext: "" 
            archive_ext: .tar.gz

    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}

    # 授予创建和上传 Release 所需的权限
    permissions:
      contents: write 

    steps:
      # 步骤 1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 1.5：设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' 
      
      # ----------------------------------------------------
      # 步骤 2：安装依赖
      # ----------------------------------------------------
      - name: Install dependencies (Linux/macOS)
        if: matrix.tool != 'msys2'
        run: |
          if [ "${{ matrix.tool }}" == "apt" ]; then
            sudo apt-get update
            sudo apt-get install -y ${{ matrix.dependencies }}
          elif [ "${{ matrix.tool }}" == "brew" ]; then
            brew update
            brew install ${{ matrix.dependencies }}
            # 确保 PKG_CONFIG_PATH 包含 Homebrew 的路径
            echo "PKG_CONFIG_PATH=$(brew --prefix aom)/lib/pkgconfig:$(brew --prefix libavif)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
          fi

      - name: Install dependencies (Windows/MSYS2)
        if: matrix.tool == 'msys2'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit 
          install: ${{ matrix.dependencies }}
          msystem: MINGW64

      # 步骤 3：下载 Go 依赖
      # 简单下载，不涉及 Cgo 依赖的路径问题，使用默认 shell
      - name: Download Go dependencies
        run: go mod download
        
      # ----------------------------------------------------
      # 步骤 4：编译 Go 程序 (重构 shell 逻辑)
      # ----------------------------------------------------
      
      # Step 4a: Build (Linux/macOS) - 使用默认 bash shell
      - name: Build (Linux/macOS)
        if: matrix.tool != 'msys2'
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          outputName="image2avif-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.filename_ext }}"
          ldflags="-s -w"
          go build -o $outputName ./main.go -ldflags="$ldflags"
          echo "outputName=$outputName" >> $GITHUB_OUTPUT
        id: build_app_unix

      # Step 4b: Build (Windows) - 显式使用 msys2 shell
      - name: Build (Windows)
        if: matrix.tool == 'msys2'
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        # 🚀 修复：显式指定 shell，避免复杂表达式
        shell: msys2 {0} 
        run: |
          outputName="image2avif-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.filename_ext }}"
          ldflags="-s -w -sysource=./resource.syso"
          go build -o $outputName ./main.go -ldflags="$ldflags"
          echo "outputName=$outputName" >> $GITHUB_OUTPUT
        id: build_app_windows

      # ----------------------------------------------------
      # 步骤 5：打包
      # ----------------------------------------------------
      - name: Package artifact
        id: package
        # 使用 if 语句来选择正确的编译产物 ID
        run: |
          # 确定编译后的文件名
          if [ "${{ matrix.goos }}" == "windows" ]; then
            exeName="${{ steps.build_app_windows.outputs.outputName }}"
          else
            exeName="${{ steps.build_app_unix.outputs.outputName }}"
          fi

          zipName="image2avif-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.archive_ext }}"
          
          if [ "${{ matrix.archive_ext }}" == ".zip" ]; then
            zip $zipName $exeName
          else
            tar -czvf $zipName $exeName
          fi
          
          echo "zip_name=$zipName" >> $GITHUB_OUTPUT
        # 🚀 修复：显式指定 shell，避免复杂表达式
        shell: ${{ matrix.tool == 'msys2' && 'msys2 {0}' || 'bash' }} 
        
      # ----------------------------------------------------
      # 步骤 6：上传到 GitHub Release
      # ----------------------------------------------------
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_name }}
          overwrite: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}