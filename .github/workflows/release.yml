name: Build with AVIF/WebP (Cgo)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-amd64
            goos: windows
            goarch: amd64
            suffix: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      # --------------------------
      # 安装系统依赖（补充 libaom 等核心库）
      # --------------------------

      # Windows 系统：通过 choco 安装 libaom（libavif 的依赖）
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # 安装 vcpkg（C++ 包管理器）
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

          # 安装 libwebp、libavif（自动包含 libaom 依赖）
          .\vcpkg\vcpkg install libwebp:x64-windows libavif:x64-windows

          # 确认安装路径（vcpkg 会自动处理依赖）
          echo "vcpkg 安装路径: $PWD/vcpkg"
          echo "头文件路径: $PWD/vcpkg/installed/x64-windows/include"
          echo "库文件路径: $PWD/vcpkg/installed/x64-windows/lib"
        shell: pwsh
        env:
          # 告诉 Cgo 头文件和库文件的位置（vcpkg 安装路径）
          CGO_CFLAGS: "-I${{ github.workspace }}/vcpkg/installed/x64-windows/include"
          CGO_LDFLAGS: "-L${{ github.workspace }}/vcpkg/installed/x64-windows/lib"
      # --------------------------
      # 编译
      # --------------------------
      - name: Build (with Cgo)
        run: |
          $outputName = "image2avif-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.suffix }}"
          $env:CGO_ENABLED = "1"
          $env:GOOS = "${{ matrix.goos }}"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -o $outputName ./main.go
        shell: pwsh

      # --------------------------
      # 打包并上传
      # --------------------------
      - name: Package
        run: |
          $zipName = "myapp-${{ github.ref_name }}-${{ matrix.target }}.zip"
          if ($Env:RUNNER_OS -eq "Windows") {
            7z a $zipName $outputName
          } else {
            zip $zipName $outputName
          }
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-${{ github.ref_name }}-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}