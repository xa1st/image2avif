name: Build with AVIF/WebP (Cgo)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-amd64
            goos: windows
            goarch: amd64
            suffix: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      # --------------------------
      # 安装系统依赖（补充 libaom 等核心库）
      # --------------------------

      # Windows 系统：通过 choco 安装 libaom（libavif 的依赖）
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          # 安装 libwebp、libavif 及其依赖 libaom
          choco install -y libwebp libavif libaom
        shell: pwsh
        env:
          # 确保头文件和库文件路径包含 libaom
          CGO_CFLAGS: "-IC:/ProgramData/chocolatey/include"
          CGO_LDFLAGS: "-LC:/ProgramData/chocolatey/lib/libwebp/lib -LC:/ProgramData/chocolatey/lib/libavif/lib -LC:/ProgramData/chocolatey/lib/libaom/lib"

      # --------------------------
      # 编译
      # --------------------------
      - name: Build (with Cgo)
        run: |
          $outputName = "image2avif-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.suffix }}"
          $env:CGO_ENABLED = "1"
          $env:GOOS = "${{ matrix.goos }}"
          $env:GOARCH = "${{ matrix.goarch }}"
          go build -o $outputName ./main.go
        shell: pwsh

      # --------------------------
      # 打包并上传
      # --------------------------
      - name: Package
        run: |
          $zipName = "myapp-${{ github.ref_name }}-${{ matrix.target }}.zip"
          if ($Env:RUNNER_OS -eq "Windows") {
            7z a $zipName $outputName
          } else {
            zip $zipName $outputName
          }
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-${{ github.ref_name }}-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}